name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  danger:
    runs-on: macos-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: 2.7.8

      - uses: MeilCli/danger-action@v5
        with:
          plugins_file: Gemfile
          install_path: vendor/bundle
          danger_file: Dangerfile
          danger_id: danger-pr
        env:
          DANGER_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: macos-26

    strategy:
      matrix:
        platform:
          - platform=iOS Simulator,name=iPhone 17 Pro Max
          - platform=iOS Simulator,name=iPhone 17 Pro
          - platform=iOS Simulator,name=iPhone 17
          - platform=iOS Simulator,name=iPhone Air
          - platform=iOS Simulator,name=iPhone 16e
          - platform=iOS Simulator,name=iPad (A16)
          - platform=iOS Simulator,name=iPad Air 13-inch (M3)
          - platform=iOS Simulator,name=iPad mini (A17 Pro)
          - platform=iOS Simulator,name=iPad Pro 13-inch (M5)
          - platform=tvOS Simulator,name=Apple TV
          - platform=tvOS Simulator,name=Apple TV 4K (3rd generation)
          - platform=watchOS Simulator,name=Apple Watch Series 11 (46mm)

    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
          ruby-version: 2.7.8

      - name: xcodebuild
        run: set -o pipefail && xcodebuild -scheme DeviceKit -destination "${{ matrix.platform }}" -configuration Debug ONLY_ACTIVE_ARCH=YES -enableCodeCoverage YES test
